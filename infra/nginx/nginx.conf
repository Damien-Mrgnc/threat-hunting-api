events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Gzip Compression Optimization
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Logs optimization
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Load Balancing Upstream (Round Robin by default)
    upstream api_cluster {
        server api:8000;
    }

    # Cache Zone Definition
    # levels: directory structure
    # keys_zone: name and size of shared memory for keys (10m = ~80k keys)
    # max_size: max size of cache on disk
    # inactive: time to keep cached content if not accessed
    # use_temp_path: off to write directly to cache dir
    proxy_cache_path /var/cache/nginx/api_stats levels=1:2 keys_zone=stats_cache:10m max_size=100m inactive=60m use_temp_path=off;

    # --- HTTP Redirect to HTTPS ---
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS Server (HTTP/2 Enabled) ---
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # SSL Certificates
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Redirect HTTP requests accidentally sent to HTTPS port (497 = HTTP sent to HTTPS port)
        error_page 497 301 =301 https://$host$request_uri;
        
        # SSL Optimization
        ssl_session_timeout 1d;
        ssl_session_cache shared:MozSSL:10m;  # about 40000 sessions
        ssl_session_tickets off;

        # Modern configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # 1. Portal (Landing Page)
        location / {
            proxy_pass http://portal:8088/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Interface (Static SPA)
        location /interface/ {
            alias /usr/share/nginx/html/;
            index index.html;
            try_files $uri $uri/ /interface/index.html;
        }

        # 2. API (Load Balanced)
        location /api/ {
            proxy_pass http://api_cluster/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # 2.1 API Stats Cache (Micro-Caching)
        location /api/stats/ {
            proxy_pass http://api_cluster/;
            
            # Cache config
            proxy_cache stats_cache;
            proxy_cache_valid 200 60s;
            proxy_cache_valid 404 10s;
            proxy_cache_bypass $http_x_no_cache;
            add_header X-Cache-Status $upstream_cache_status;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Grafana (Monitoring)
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. Prometheus (Metrics)
        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
        }

        # 5. Adminer (DB Admin)
        location /db-admin/ {
            proxy_pass http://adminer:8080/;
        }

        # 6. Documentation Portal
        location /docs {
            proxy_pass http://portal:8088/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
