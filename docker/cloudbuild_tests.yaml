steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/threat-hunting/tests:latest'
      - '-f'
      - 'docker/Dockerfile.tests'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/threat-hunting/tests:latest'
images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/threat-hunting/tests:latest'
